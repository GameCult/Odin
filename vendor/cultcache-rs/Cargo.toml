[package]
name = "cultcache-rs"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]
members = ["cultcache-rs-derive"]

[lib]
name = "cultcache_rs"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
cultcache-rs-derive = { path = "cultcache-rs-derive" }
fs2 = "0.4"
rmp-serde = "1.3"
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
serde_json = "1"
uuid = { version = "1", features = ["v4"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Storage_FileSystem"] }

[dev-dependencies]
pretty_assertions = "1.4"
tempfile = "3"
